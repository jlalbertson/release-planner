# config/big_rocks.yaml
release: "3.5"

# fixVersion variants are used by Pass 1 (committed issues).
# The pipeline appends: AND fixVersion IN ({fix_versions})
# to each rock's base JQL for Pass 1 only.
fix_versions:
  - "RHOAI {release}"
  - "RHOAI-{release}"
  - "{release}"
  - "{release}.0"
  - "RHAIIS-{release}"

# Project scope for all queries
projects: "RHAISTRAT, RHAIRFE"

big_rocks:
  - priority: 1
    name: "MaaS"
    full_name: "MaaS (continue from 3.4)"
    pillar: "Inference"
    state: "continue from 3.4"
    owner: "Pat Johnson"
    components:
      - "Model as a Service"
      - "MaaS"
      - "AI Core Dashboard"
    # Curated from Q1 2026 PM/Eng Planning PDF, slide 6 – 3Q 2026 column
    issue_keys:
      # Committed (Target release set for 3.5)
      - "RHAISTRAT-9032"   # [TP] Loki-Based Showback & User-Scoped Dashboards
      # Dependencies on other teams
      - "RHAISTRAT-9030"   # llm-d team – deliver batch endpoint
      # RFE Not Approved
      - "RHAIRFE-1486"     # [TP] MaaS Body-Based Policy Enforcement
      - "RHAIRFE-1487"     # [TP] MaaS Multi-Tenancy – Per-Tenant Gateway
      - "RHAIRFE-1002"     # [TP] Consumer-Focused MaaS Portal
      - "RHAIRFE-1408"     # [Future] Guardrails via BBR Plugin
      - "RHAIRFE-940"      # Batch Inference API
      - "RHAIRFE-1407"     # [DP] Intelligent Routing BBR+vSR
    jql: >-
      project in ({projects})
      AND component in ("Model as a Service", "MaaS", "AI Core Dashboard")
      ORDER BY priority ASC, key ASC
    rfe_jql: >-
      project = RHAIRFE
      AND component in ("Model as a Service", "MaaS", "AI Core Dashboard")
      ORDER BY priority ASC, key ASC
    exclude_keywords: []

