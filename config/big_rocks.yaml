# config/big_rocks.yaml
release: "3.5"

# fixVersion variants are used by Pass 1 (committed issues).
# The pipeline appends: AND fixVersion IN ({fix_versions})
# to each rock's base JQL for Pass 1 only.
fix_versions:
  - "RHOAI {release}"
  - "RHOAI-{release}"
  - "{release}"
  - "{release}.0"
  - "RHAIIS-{release}"

# Project scope for all queries
projects: "RHAISTRAT, RHAIRFE, AIPCC, KONFLUX, RHOAIENG, PSX"

big_rocks:
  - priority: 1
    name: "MaaS"
    full_name: "MaaS (continue from 3.4)"
    pillar: "Inference"
    state: "continue from 3.4"
    components:
      - "Model as a Service"
      - "MaaS"
      - "AI Core Dashboard"
    jql: >-
      project in ({projects})
      AND component in ("Model as a Service", "MaaS", "AI Core Dashboard")
      ORDER BY priority ASC, key ASC
    rfe_jql: >-
      project = RHAIRFE
      AND component in ("Model as a Service", "MaaS", "AI Core Dashboard")
      ORDER BY priority ASC, key ASC
    exclude_keywords: []

  - priority: 2
    name: "Gen AI Studio"
    full_name: "Gen AI Studio (continue from 3.4)"
    pillar: "Agents"
    state: "continue from 3.4"
    components:
      - "Gen AI Studio"
      - "AI Core Dashboard"
      - "RAG + Vector DB"
    jql: >-
      project in ({projects})
      AND component in ("Gen AI Studio", "AI Core Dashboard", "RAG + Vector DB")
      ORDER BY priority ASC, key ASC
    rfe_jql: >-
      project = RHAIRFE
      AND component in ("Gen AI Studio", "AI Core Dashboard", "RAG + Vector DB")
      ORDER BY priority ASC, key ASC
    exclude_keywords: []

  - priority: 3
    name: "Prompt Lab"
