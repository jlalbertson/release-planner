    state: "continue from 3.4"
    components:
      - "AgentOps"
      - "Llama Stack Core"
    jql: >-
      project in ({projects})
      AND component in ("AgentOps", "Llama Stack Core")
      ORDER BY priority ASC, key ASC
    rfe_jql: >-
      project = RHAIRFE
      AND component in ("AgentOps", "Llama Stack Core")
      ORDER BY priority ASC, key ASC
    exclude_keywords: []

  - priority: 5
    name: "BYO Agent"
    full_name: "BYO Agent (continue from 3.4)"
    pillar: "Agents"
    state: "continue from 3.4"
