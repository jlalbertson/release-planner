# k8s/route.yaml
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: release-planner
  namespace: rhoai-release-planner
  labels:
    app: release-planner
spec:
  to:
    kind: Service
    name: release-planner
    weight: 100
  port:
    targetPort: 9000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
