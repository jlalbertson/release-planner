# k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: release-planner-secrets
  namespace: rhoai-release-planner
type: Opaque
stringData:
  # Jira Cloud API token (NOT a Jira Server/DC PAT).
  # This app uses Jira Cloud (redhat.atlassian.net) with HTTP Basic Auth:
  #   username = JIRA_EMAIL (set in Deployment env)
  #   password = RELEASE_PLANNER_JIRA_TOKEN (this value)
  # Generate at: https://id.atlassian.com/manage-profile/security/api-tokens
  RELEASE_PLANNER_JIRA_TOKEN: "<your-jira-cloud-api-token>"
  RELEASE_PLANNER_API_KEY: "<shared-api-key>"
  # Optional: Google Sheets credentials.
  # Option A -- inline JSON (preferred for Kubernetes Secrets):
  # GOOGLE_CREDENTIALS_JSON: '{"type": "service_account", ...}'
  # Option B -- file path (mount the JSON file and set this path):
  # GOOGLE_CREDENTIALS_FILE: '/opt/app-root/secrets/google-credentials.json'
